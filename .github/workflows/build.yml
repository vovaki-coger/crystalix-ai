name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller mss Pillow requests keyboard

      - name: Build EXE
        run: pyinstaller --onefile --windowed --name "CrystalixAI" main.py

      - name: Copy data files
        run: |
          copy config.json dist\config.json
          copy knowledge.md dist\knowledge.md
          copy start.bat dist\start.bat

      - name: Create ZIP
        run: Compress-Archive -Path dist\* -DestinationPath CrystalixAI-Windows.zip

      - name: Upload to release
        run: gh release upload v1.0.0 CrystalixAI-Windows.zip --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
